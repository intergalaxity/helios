<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download - HeliOS</title>
    <!-- Import Open Sans from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Modern reset and base styles */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            font-family: 'Open Sans', sans-serif;
            color: #ffffff;
            background-color: #000000;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        /* Header layout (Mirrored from Landing Page) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 30px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background-color: rgba(0, 0, 0, 0.8);
        }

        .logo {
            max-height: 40px;
            width: auto;
            display: block;
        }

        nav {
            display: flex;
            gap: 35px;
            align-items: center;
        }

        .nav-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 10px 0;
        }

        .nav-link:hover {
            opacity: 0.7;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background-color: #1a1a1a;
            min-width: 180px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.8);
            z-index: 101;
            border: 1px solid #333;
        }

        .dropdown-content a {
            color: white;
            padding: 14px 18px;
            text-decoration: none;
            display: block;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .dropdown-content a:hover {
            background-color: #333;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .arrow-down {
            width: 10px;
            height: 10px;
            fill: currentColor;
        }

        /* Download Section */
        .download-container {
            min-height: 100vh;
            padding: 160px 80px 100px 80px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .download-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .download-title {
            font-size: 48px;
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        .download-subtitle {
            font-size: 18px;
            opacity: 0.6;
            margin: 0;
        }

        .download-content {
            width: 100%;
            max-width: 500px;
        }

        .download-card {
            background-color: #111;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        .download-card:hover {
            border-color: rgba(255, 255, 255, 0.3);
        }

        .card-version {
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: block;
        }

        .card-title {
            font-size: 32px;
            margin: 0 0 20px 0;
            font-weight: 700;
        }

        .card-description {
            font-size: 16px;
            line-height: 1.6;
            opacity: 0.6;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 18px 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            text-decoration: none;
            border-radius: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-primary {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #ffffff;
        }

        .btn-primary:hover {
            background-color: transparent;
            color: #ffffff;
        }

        /* Footer (Mirrored from Landing Page) */
        footer {
            background-color: #000000;
            padding: 60px 80px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .footer-logo {
            max-height: 30px;
            width: auto;
            opacity: 1; 
        }

        .footer-nav {
            display: flex;
            gap: 40px;
        }

        .footer-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .footer-link:hover {
            opacity: 1;
        }

        .copyright {
            font-size: 12px;
            opacity: 0.3;
            margin: 0;
        }

        @media (max-width: 768px) {
            header { padding: 20px 30px; }
            .download-container { padding: 120px 30px 60px 30px; }
            .download-title { font-size: 32px; }
            .footer-nav { flex-direction: column; gap: 20px; text-align: center; }
        }
    </style>
</head>
<body>
    <header>
        <img 
            src="https://raw.githubusercontent.com/intergalaxity/helios/refs/heads/main/HeliOS%20Logo.png" 
            alt="HeliOS Logo" 
            class="logo"
            onclick="window.location.href='black_screen.html'"
            style="cursor: pointer;"
        >
        <nav>
            <a href="black_screen.html" class="nav-link">Home</a>
            <a href="black_screen.html#about" class="nav-link">About</a>
            <a href="#" class="nav-link">News</a>
            <div class="dropdown">
                <a class="nav-link">
                    Download
                    <svg class="arrow-down" viewBox="0 0 20 20">
                        <path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
                    </svg>
                </a>
                <div class="dropdown-content">
                    <a href="#">HeliOS Pro</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="download-container">
        <div class="download-header">
            <h1 class="download-title">Get HeliOS</h1>
            <p class="download-subtitle">Experience the full thing.</p>
        </div>

        <div class="download-content">
            <!-- HeliOS Pro Version -->
            <div class="download-card">
                <span class="card-version">Latest Release</span>
                <h2 class="card-title">HeliOS Pro</h2>
                <p class="card-description">The full thing. WOWA</p>
                <a href="#" class="btn btn-primary">Download .zip</a>
            </div>
        </div>
    </main>

    <footer>
        <img 
            src="https://raw.githubusercontent.com/intergalaxity/helios/refs/heads/main/HeliOS%20Logo.png" 
            alt="HeliOS Logo" 
            class="footer-logo"
        >
        <div class="footer-nav">
            <a href="black_screen.html" class="footer-link">Home</a>
            <a href="black_screen.html#about" class="footer-link">About</a>
            <a href="#" class="footer-link">Download</a>
            <a href="#" class="footer-link">Guide</a>
        </div>
        <p class="copyright">&copy; 2026 HeliOS. "a simple os."</p>
    </footer>
</body>
</html>
